spring:
  application:
    name: magizhchi-share

  # ── Database ────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:magizhchi_share}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  # ── Redis (OTP cache, presence, rate-limiting) ───────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

  # ── Email (OTP + notifications) ─────────────────────────────
  mail:
    host:     ${MAIL_HOST:smtp.gmail.com}
    port:     ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

  # ── File upload limits ───────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 2GB      # folder uploads can contain many files
      enabled: true

# ── Server ─────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# ── JWT ────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:magizhchi-share-super-secret-key-change-in-production-2024}
  expiration-ms: ${JWT_EXPIRY_MS:86400000}        # 24 hours
  refresh-expiry-ms: ${JWT_REFRESH_MS:604800000}   # 7 days

# ── AWS S3 ─────────────────────────────────────────────────────
aws:
  region: ${AWS_REGION:ap-south-1}
  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  s3:
    bucket-name: ${AWS_S3_BUCKET:magizhchi-share}
    presigned-url-expiry-minutes: 60
    # endpoint: override for LocalStack — set in application-local.yml

# ── OTP ────────────────────────────────────────────────────────
otp:
  length: 6
  expiry-minutes: 10
  max-attempts: 3
  rate-limit-window-minutes: 15   # window resets every 15 min (was 60 — too long)
  rate-limit-max-sends: 5         # max 5 OTPs per 15-min window (60s cooldown already prevents rapid sends)
  # Set to true in dev to skip SMS and print OTP in logs
  mock: ${OTP_MOCK:false}

# ── Twilio (SMS) ────────────────────────────────────────────────
twilio:
  account-sid:        ${TWILIO_ACCOUNT_SID:}
  auth-token:         ${TWILIO_AUTH_TOKEN:}
  verify-service-sid: ${TWILIO_VERIFY_SID:}

# ── CORS ───────────────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}

# ── File constraints ─────────────────────────────────────────
file:
  max-size-bytes: 524288000   # 500 MB
  # Block-list: all file types are allowed EXCEPT these executables / installers
  blocked-types:
    - application/x-msdownload          # .exe
    - application/x-msdos-program       # .com, .bat
    - application/x-executable          # Linux executables
    - application/x-sh                  # shell scripts
    - application/x-bat                 # batch files
    - application/x-csh                 # csh scripts
    - application/vnd.android.package-archive   # .apk
    - application/x-apple-diskimage     # .dmg
    - application/x-rpm                 # .rpm
    - application/x-debian-package      # .deb
    - application/x-iso9660-image       # .iso
    - application/x-ms-installer        # .msi

# ── Connection / Privacy ───────────────────────────────────────
app:
  connection:
    daily-request-limit: 15   # max connection requests per user per 24 h

# ── Logging ────────────────────────────────────────────────────
logging:
  level:
    com.magizhchi.share: DEBUG
    org.springframework.security: INFO
    org.springframework.web.socket: INFO
